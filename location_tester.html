<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MINDCLASH — Verifying Location</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0f;
      display: grid;
      place-items: center;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── background orbs matching login page ── */
    .bg {
      position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none;
    }
    .bg-orb {
      position: absolute; border-radius: 50%; filter: blur(90px);
      animation: pulse 8s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 500px; height: 500px; top: -120px; left: -100px; background: rgba(192,22,90,.3); }
    .bg-orb-2 { width: 400px; height: 400px; bottom: -100px; right: -80px; background: rgba(0,102,204,.3); }
    .bg-orb-3 { width: 320px; height: 320px; top: 40%; left: 40%; background: rgba(100,30,200,.2); }
    @keyframes pulse {
      from { opacity:.6; transform: scale(1); }
      to   { opacity:1;  transform: scale(1.1); }
    }

    /* ── card ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: 52px 52px 44px;
      width: min(460px, 92vw);
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      backdrop-filter: blur(12px);
    }

    /* brand */
    .brand {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: .88rem; font-weight: 600; color: rgba(255,255,255,.5);
      letter-spacing: .04em; margin-bottom: 36px;
    }

    /* icon ring */
    .icon-ring {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 24px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.1);
      font-size: 1.9rem;
      transition: background .4s;
    }
    .icon-ring.granted { background: rgba(80,220,140,.12); border-color: rgba(80,220,140,.3); }
    .icon-ring.denied  { background: rgba(220,60,60,.12);  border-color: rgba(220,60,60,.3);  }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem; color: #fff; margin-bottom: 10px;
    }
    .subtitle {
      font-size: .88rem; color: rgba(255,255,255,.45); margin-bottom: 32px; line-height: 1.6;
    }

    /* status box */
    .status-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px 20px;
      font-size: .85rem;
      color: rgba(255,255,255,.6);
      line-height: 1.7;
      min-height: 60px;
      transition: border-color .4s;
    }
    .status-box.granted { border-color: rgba(80,220,140,.35); color: #6bffb8; }
    .status-box.denied  { border-color: rgba(220,80,80,.35);  color: #ff8080; }
    .status-box.loading { color: #f0c060; }

    /* spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #f0c060;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* detail line */
    .detail {
      margin-top: 12px; font-size: .76rem; color: rgba(255,255,255,.25);
    }

    /* button */
    .btn {
      margin-top: 24px; width: 100%;
      padding: 13px; background: #fff; color: #111;
      border: none; border-radius: 10px;
      font-size: .88rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .2s, transform .1s;
      display: none;
    }
    .btn:hover  { background: #e8e8e8; }
    .btn:active { transform: scale(.98); }
    .btn.visible { display: block; }

    .btn-secondary {
      margin-top: 10px; width: 100%;
      padding: 11px; background: transparent; color: rgba(255,255,255,.4);
      border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
      font-size: .82rem; font-family: inherit; cursor: pointer;
      transition: border-color .2s, color .2s;
      display: none;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.7); }
    .btn-secondary.visible { display: block; }

    /* user chip */
    .user-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 5px 14px; font-size: .78rem;
      color: rgba(255,255,255,.5); margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="card">

  <!-- Brand -->
  <div class="brand">
    <svg width="18" height="18" viewBox="0 0 26 26" fill="none">
      <path d="M3 13C3 7.477 7.477 3 13 3s10 4.477 10 10-4.477 10-10 10S3 18.523 3 13Z" stroke="currentColor" stroke-width="1.5"/>
      <path d="M7 13q2-4 6 0t6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M7 16q2-3 6 0t6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-opacity=".4"/>
    </svg>
    MINDCLASH
  </div>

  <!-- User chip — filled by JS -->
  <div class="user-chip" id="userChip" style="display:none">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span id="userChipText"></span>
  </div>

  <!-- Icon -->
  <div class="icon-ring" id="iconRing">📍</div>

  <h2 id="cardTitle">Verifying Location</h2>
  <p class="subtitle" id="cardSub">Please allow location access.<br>Access is restricted to Chitkara University campus.</p>

  <!-- Status -->
  <div class="status-box loading" id="statusBox">
    Waiting for your permission…
  </div>
  <div class="detail" id="detail"></div>

  <!-- Actions -->
  <button class="btn" id="btnPrimary"></button>
  <button class="btn-secondary" id="btnSecondary" onclick="goBackToLogin()">← Back to Login</button>

</div>

<script>
  // ═══════════════════════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════════════════════

  // ⚠️  Paste your Google Apps Script Web App URL (same one used in auth.js)
  const SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzF41Fq9vgSqu60c4y9qarGYSNUdXL45FjZNN8mBqg6eK_rgWb14bNh3tL4oOhUYvBM/exec';

  // Chitkara University Punjab
  const ALLOWED_LAT       = 30.5167;
  const ALLOWED_LON       = 76.6590;
  const ALLOWED_RADIUS_KM = 1;

  // ⚠️  Change to your actual dashboard / homepage path
  const DASHBOARD_URL = 'homepage.html'; // changed from dashboard.html

  // ═══════════════════════════════════════════════════════════
  //  READ LOGGED-IN USER from sessionStorage (set by auth.js)
  // ═══════════════════════════════════════════════════════════
  let currentUser = { name: 'Unknown', roll: 'Unknown' };

  try {
    const pending = JSON.parse(sessionStorage.getItem('mindclash_pending') || 'null');
    const session = JSON.parse(sessionStorage.getItem('mindclash_session') || 'null');
    const src     = pending || session;
    if (src) {
      currentUser.name = src.name || src.name || 'Unknown';
      currentUser.roll = src.roll || 'Unknown';
      // Show user chip
      document.getElementById('userChipText').textContent = `${currentUser.name} · ${currentUser.roll}`;
      document.getElementById('userChip').style.display = 'inline-flex';
    }
  } catch (_) {}

  // ═══════════════════════════════════════════════════════════
  //  HAVERSINE
  // ═══════════════════════════════════════════════════════════
  function getDistance(lat1, lon1, lat2, lon2) {
    const R    = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a    =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ═══════════════════════════════════════════════════════════
  //  UI HELPERS
  // ═══════════════════════════════════════════════════════════
  function setStatus(html, type) {
    const box = document.getElementById('statusBox');
    box.innerHTML  = html;
    box.className  = 'status-box ' + (type || '');
  }
  function setDetail(txt) {
    document.getElementById('detail').textContent = txt;
  }
  function showPrimaryBtn(label, fn) {
    const b = document.getElementById('btnPrimary');
    b.textContent  = label;
    b.onclick      = fn;
    b.classList.add('visible');
  }
  function showSecondaryBtn() {
    document.getElementById('btnSecondary').classList.add('visible');
  }
  function setIcon(emoji, type) {
    const r = document.getElementById('iconRing');
    r.textContent = emoji;
    r.className   = 'icon-ring ' + (type || '');
  }

  // ═══════════════════════════════════════════════════════════
  //  SHEET LOGGER  (GET params — no CORS preflight)
  //
  //  Writes to a tab called "AccessDenied" in your Sheet.
  //  Columns: Timestamp | Name | Roll Number | Latitude |
  //           Longitude | Distance | IP Address
  //
  //  Apps Script (add this inside your existing doGet):
  //
  //  if (e.parameter.sheet === 'AccessDenied') {
  //    var dSheet = ss.getSheetByName('AccessDenied')
  //                 || ss.insertSheet('AccessDenied');
  //    dSheet.appendRow([
  //      e.parameter.timestamp,
  //      e.parameter.name,
  //      e.parameter.rollNumber,
  //      e.parameter.latitude,
  //      e.parameter.longitude,
  //      e.parameter.distance,
  //      e.parameter.ip
  //    ]);
  //  }
  // ═══════════════════════════════════════════════════════════
  function logDeniedToSheet({ lat, lon, dist, ip }) {
    if (!SHEET_ENDPOINT || SHEET_ENDPOINT.startsWith('YOUR_')) {
      console.warn('⚠️  Set SHEET_ENDPOINT in location_tester.html');
      return;
    }
    const params = new URLSearchParams({
      sheet:      'AccessDenied',
      timestamp:  new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }),
      name:       currentUser.name,
      rollNumber: currentUser.roll,
      latitude:   lat.toFixed(6),
      longitude:  lon.toFixed(6),
      distance:   dist.toFixed(3) + ' km',
      ip:         ip || '—',
    });
    fetch(SHEET_ENDPOINT + '?' + params.toString(), { method: 'GET', mode: 'no-cors' })
      .then(() => console.log('✅ Denied access logged for', currentUser.name))
      .catch(err => console.error('❌ Sheet log failed:', err));
  }

  function fetchIPThenLog(lat, lon, dist) {
    fetch('https://api.ipify.org?format=json')
      .then(r  => r.json())
      .then(d  => logDeniedToSheet({ lat, lon, dist, ip: d.ip }))
      .catch(() => logDeniedToSheet({ lat, lon, dist, ip: 'unknown' }));
  }

  // ═══════════════════════════════════════════════════════════
  //  LOCATION CHECK — runs automatically on page load
  // ═══════════════════════════════════════════════════════════
  function startLocationCheck() {
    if (!navigator.geolocation) {
      setIcon('⚠️');
      document.getElementById('cardTitle').textContent = 'Not Supported';
      setStatus('Geolocation is not supported by your browser.', 'denied');
      showSecondaryBtn();
      return;
    }

    setStatus('<span class="spinner"></span> Getting your location…', 'loading');
    document.getElementById('cardTitle').textContent = 'Verifying Location';

    navigator.geolocation.getCurrentPosition(
      onSuccess,
      onError,
      { enableHighAccuracy: true, timeout: 12000 }
    );
  }

  function onSuccess(pos) {
    const { latitude: lat, longitude: lon, accuracy } = pos.coords;
    const dist = getDistance(lat, lon, ALLOWED_LAT, ALLOWED_LON);

    if (dist <= ALLOWED_RADIUS_KM) {
      // ── GRANTED ─────────────────────────────────────────────
      setIcon('✅', 'granted');
      document.getElementById('cardTitle').textContent = 'Access Granted';
      document.getElementById('cardSub').textContent   = 'You\'re on campus. Redirecting you now…';
      setStatus('Location verified. Welcome to MINDCLASH!', 'granted');
      setDetail(`${dist.toFixed(2)} km from campus · ±${Math.round(accuracy)} m accuracy`);
      // Clear pending, keep session
      sessionStorage.removeItem('mindclash_pending');
      setTimeout(() => { window.location.href = DASHBOARD_URL; }, 1500);

    } else {
      // ── DENIED ──────────────────────────────────────────────
      setIcon('🚫', 'denied');
      document.getElementById('cardTitle').textContent = 'Access Denied';
      document.getElementById('cardSub').textContent   = 'You must be on Chitkara University campus to access MINDCLASH.';
      setStatus(
        `You are <strong>${dist.toFixed(2)} km</strong> away from the allowed campus area.`,
        'denied'
      );
      setDetail(`Your coordinates: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
      showPrimaryBtn('Try Again', startLocationCheck);
      showSecondaryBtn();

      // Log to Sheet with name + roll
      fetchIPThenLog(lat, lon, dist);
    }
  }

  function onError(err) {
    const msgs = {
      1: 'Location permission was denied. Please enable it in your browser settings and try again.',
      2: 'Your location could not be determined. Check your GPS or network.',
      3: 'Location request timed out. Please try again.',
    };
    setIcon('⚠️');
    document.getElementById('cardTitle').textContent = 'Location Error';
    setStatus(msgs[err.code] || 'Unable to retrieve your location.', 'denied');
    showPrimaryBtn('Try Again', startLocationCheck);
    showSecondaryBtn();
  }

  function goBackToLogin() {
    sessionStorage.removeItem('mindclash_pending');
    sessionStorage.removeItem('mindclash_session');
    window.location.href = 'index.html';
  }

  // ── Auto-start on load ────────────────────────────────────
  window.addEventListener('load', startLocationCheck);
</script>
</body>
</html>
